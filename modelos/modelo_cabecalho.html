<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Modelo de Cabeçalho - RobôMestres</title>
    <!-- Bootstrap 5 (para responsividade e ícones) -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700;800&family=Press+Start+2P&family=Chakra+Petch:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- CSS específico do módulo cabeçalho -->
    <link rel="stylesheet" href="modelo_css/modelo_cabecalho.css" />
  </head>

  <body class="bg-robotica">
    <!-- CABEÇALHO REBELDE -->
    <header class="cabecalho-robotico cabecalho-rebelde">
      <div class="container">
        <div class="row align-items-center justify-content-between g-2">
          <div class="col-auto">
            <img
              src="imagens/logo_rb.png"
              alt="Logo Rodrigo Barbosa"
              class="logo-rb"
              onerror="this.src = 'https://placehold.co/80x80?text=RB'"
            />
          </div>
          <div class="col text-center">
            <h1 class="titulo-principal glitch-text">
              🤖 ROBÓTICA NO ENSINO FUNDAMENTAL I — 2º ANO
              <span class="parafuso-esquerda">⬤</span>
            </h1>
            <div class="subtitulo-chiclete">
              ⚡ 1º BIMESTRE: SE VOCÊ SOBREVIVEU AO 1º ANO, ENTÃO VAI ADORAR
              ISSO; SENÃO… AGUENTA ⚡<br />
              <span class="selo-sucata mt-2 d-inline-block"
                >APROVADO PELO MINISTÉRIO DO SE-ENTÃO-SENÃO</span
              >
            </div>
          </div>
          <div class="col-auto">
            <img
              src="imagens/logo_gn.png"
              alt="Logo Gisele Nunes"
              class="logo-gn"
              onerror="this.src = 'https://placehold.co/80x80?text=GN'"
            />
          </div>
        </div>
      </div>
    </header>

    <!-- Conteúdo principal será inserido aqui -->
    <main class="container my-4">
      <div class="alert alert-info text-center">
        <i class="bi bi-info-circle"></i> Conteúdo da página aqui...
      </div>
    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <!-- JS específico do módulo cabeçalho -->
    <script src="modelo_js/modelo_cabecalho.js"></script>
  </body>
</html>
